<!DOCTYPE html>
<html class="theme-auto" lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Pensées Jeunes</title>
  <link rel="icon" type="image/x-icon" href="/images/avatar.png">

  <meta name="description" content="Pensées Jeunes, un podcast où Dos et Mister X discutent des sujets qui touchent les jeunes.">
  <meta name="keywords" content="Pensées Jeunes, podcast jeunesse, podcast francophone, Dos, Mister X">
  <meta rel="canonical" href="https://penseesjeunes.com">
  <meta name="author" content="Pensées Jeunes">

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/brands.css">
</head>

<body>
  <div class="container">
    <div class="column">

      <img class="avatar avatar--rounded" src="images/avatar.png" srcset="images/avatar@2x.png 2x" alt="Pensées Jeunes">

      <h1>
        <div>Pensées Jeunes</div>
      </h1>

      <p>Un podcast avec Dos et Mister X.</p>

      <div class="button-stack" role="navigation">

        <a class="button button-yt" href="https://www.youtube.com/@penséesjeune" target="_blank" rel="noopener" role="button">
          <img class="icon" aria-hidden="true" src="images/icons/youtube.svg" alt="YouTube Logo">
          Regarder sur YouTube
        </a>

        <a class="button button-instagram" href="https://instagram.com/penseesjeune" target="_blank" rel="noopener" role="button">
          <img class="icon" aria-hidden="true" src="images/icons/instagram.svg" alt="Instagram Logo">
          Suivre sur Instagram
        </a>

        <a class="button button-tiktok" href="#" target="_blank" rel="noopener" role="button">
          <img class="icon" aria-hidden="true" src="images/icons/tiktok.svg" alt="TikTok Logo">
          TikTok
        </a>

        <a class="button button-default" href="mailto:penseesjeunesgeneral@gmail.com" target="_blank" rel="noopener" role="button">
          <img class="icon" aria-hidden="true" src="images/icons/generic-email.svg" alt="Email Icon">
          Contact
        </a>

      </div>

      <footer>
        © Pensées Jeunes
      </footer>

    </div>
  </div>

</html>
